version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: sda_db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"

    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate accounts && 
             python manage.py migrate &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql://root:rootpassword@db:3306/sda_db
      - REDIS_URL=redis://redis:6379/1
      - GOOGLE_CLIENT_ID=874865834704-24mhoqsfmhbe86sdrsqj972qdi9cnk5o.apps.googleusercontent.com
      - RAZORPAY_KEY_ID=rzp_test_SiSvPgymbTRV0H
      - RAZORPAY_KEY_SECRET=VqHCM25obXGhpstyNeiQXau8

  frontend:
    build: ./frontend
    ports:
      - "5173:80"

    depends_on:
      - backend

volumes:
  db_data:
